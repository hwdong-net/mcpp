<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>现代C++编程实战 - 阅读</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css">
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '现代C++编程实战',
      repo: '',
      loadSidebar: true,      // 启用侧边栏
      subMaxLevel: 2,
      auto2top: true,
      sidebarDisplayLevel: 1,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索章节...',
        noData: '未找到相关内容'
      },
      copyCode: {
        buttonText: '复制代码',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>

  <style>
    @media (max-width: 768px) {
      .sidebar { padding-top: 60px; }
      .content { padding: 20px; }
    }
    pre[data-lang] { border-radius: 8px; }
    .markdown-section h1 { border-bottom: 2px solid #42b983; padding-bottom: 10px; }
    
    /* 让侧边栏卡片固定在底部 */
    .sidebar {
      display: flex;
      flex-direction: column;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar > div:last-child {
      margin-top: auto;
      padding-bottom: 20px;
    }
  </style>
</body>
</html>
